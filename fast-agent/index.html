<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fast Browser Agent</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Segoe UI, Arial, sans-serif;
      --bg: #eef2f6;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #d8dee8;
      --line-strong: #c5ccd8;
      --text: #1f2630;
      --muted: #687385;
      --accent: #c81e2a;
      --accent-dark: #a81924;
      --accent-soft: #fff1f2;
      --blue-soft: #eef6ff;
      --shadow: 0 18px 45px rgba(31, 38, 48, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
    }
    button, textarea, select { font: inherit; }
    button { cursor: pointer; }
    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      padding: 14px;
      gap: 14px;
    }
    .sidebar,
    .workspace {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-height: 0;
    }
    .sidebar {
      display: grid;
      grid-template-rows: auto auto 1fr;
      overflow: hidden;
    }
    .brand {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }
    .brand h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .sidebar-actions {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .new-chat {
      width: 100%;
      height: 38px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .new-chat:hover { background: var(--accent-dark); }
    .history {
      overflow: auto;
      padding: 8px;
    }
    .empty-history {
      padding: 14px 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    .thread {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      padding: 9px 8px;
      margin-bottom: 4px;
      color: var(--text);
      text-align: left;
    }
    .thread:hover { background: var(--panel-soft); border-color: var(--line); }
    .thread.active { background: var(--accent-soft); border-color: #f0b7bd; }
    .thread-title {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 14px;
      font-weight: 650;
    }
    .thread-meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .delete-thread {
      width: 28px;
      height: 28px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
    }
    .delete-thread:hover {
      border-color: var(--line);
      background: #fff;
      color: var(--accent);
    }
    .workspace {
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .topbar {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .title-block {
      min-width: 0;
    }
    #conversationTitle {
      margin: 0;
      font-size: 16px;
      line-height: 1.3;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    #status {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }
    label {
      color: var(--muted);
      font-size: 13px;
    }
    select {
      width: min(340px, 36vw);
      height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
    }
    #log {
      overflow: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(180deg, rgba(238, 242, 246, .8), rgba(255, 255, 255, 0)) border-box;
    }
    .welcome {
      max-width: 620px;
      margin: auto;
      text-align: center;
      color: var(--muted);
      line-height: 1.5;
    }
    .welcome strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 18px;
    }
    .msg-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      max-width: min(780px, 88%);
    }
    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg-row.assistant { align-self: flex-start; }
    .bubble {
      min-width: 140px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      line-height: 1.48;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .user .bubble {
      background: var(--blue-soft);
      border-color: #bfd8f4;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: normal;
    }
    .menu-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font-weight: 800;
      flex: 0 0 auto;
    }
    .menu-btn:hover { border-color: var(--line-strong); color: var(--text); }
    .trace {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #edf0f4;
      padding-top: 8px;
      color: #3f4652;
      font-size: 13px;
      white-space: normal;
    }
    .trace.open { display: block; }
    .step {
      padding: 7px 0;
      border-top: 1px solid #edf0f4;
      overflow-wrap: anywhere;
    }
    .step:first-child { border-top: 0; }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    textarea {
      min-height: 52px;
      max-height: 170px;
      resize: vertical;
      padding: 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      color: var(--text);
      outline: none;
    }
    textarea:focus {
      border-color: #7aa7d9;
      box-shadow: 0 0 0 3px rgba(122, 167, 217, .18);
    }
    #send {
      width: 92px;
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
    }
    #send:hover { background: var(--accent-dark); }
    #send:disabled {
      opacity: .55;
      cursor: wait;
    }
    @media (max-width: 780px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(180px, 30vh) minmax(0, 1fr);
        padding: 8px;
        gap: 8px;
      }
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }
      .controls {
        align-items: stretch;
        flex-direction: column;
      }
      select { width: 100%; }
      .msg-row { max-width: 96%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <section class="brand">
        <h1>Fast Browser Agent</h1>
        <p>Điều khiển trình duyệt local với quan sát và xác minh từng bước.</p>
      </section>
      <section class="sidebar-actions">
        <button class="new-chat" id="newChat" type="button">Cuộc hội thoại mới</button>
      </section>
      <nav class="history" id="history" aria-label="Lịch sử hội thoại"></nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="title-block">
          <h2 id="conversationTitle">Cuộc hội thoại mới</h2>
          <div id="status">Sẵn sàng. Log chi tiết nằm trong nút ba chấm của từng phản hồi.</div>
        </div>
        <div class="controls">
          <label for="model">Model</label>
          <select id="model"></select>
        </div>
      </header>

      <section id="log" aria-live="polite"></section>

      <form class="composer" id="form">
        <textarea id="message" placeholder="Ví dụ: đọc trang hiện tại và cho tôi biết đang mở tab nào"></textarea>
        <button id="send" type="submit">Gửi</button>
      </form>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "fastAgentConversations.v1";
    const ACTIVE_KEY = "fastAgentActiveConversation.v1";

    const log = document.querySelector("#log");
    const form = document.querySelector("#form");
    const input = document.querySelector("#message");
    const send = document.querySelector("#send");
    const status = document.querySelector("#status");
    const modelSelect = document.querySelector("#model");
    const historyEl = document.querySelector("#history");
    const newChat = document.querySelector("#newChat");
    const conversationTitle = document.querySelector("#conversationTitle");

    let conversations = loadConversations();
    let activeId = localStorage.getItem(ACTIVE_KEY);
    if (!conversations.length) createConversation(false);
    if (!conversations.some(item => item.id === activeId)) activeId = conversations[0].id;
    saveState();

    function nowIso() {
      return new Date().toISOString();
    }

    function loadConversations() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveState() {
      conversations.sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
      localStorage.setItem(ACTIVE_KEY, activeId);
    }

    function currentConversation() {
      return conversations.find(item => item.id === activeId);
    }

    function createConversation(render = true) {
      const id = crypto.randomUUID();
      const createdAt = nowIso();
      conversations.unshift({
        id,
        title: "Cuộc hội thoại mới",
        createdAt,
        updatedAt: createdAt,
        messages: []
      });
      activeId = id;
      saveState();
      if (render) renderApp();
      return id;
    }

    async function resetServerSession(sessionId) {
      try {
        await fetch("/api/session/reset", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ sessionId })
        });
      } catch {
        // Ignore network/reset failures; local conversation state still updates.
      }
    }

    function deleteConversation(id) {
      conversations = conversations.filter(item => item.id !== id);
      resetServerSession(id);
      if (!conversations.length) {
        createConversation(false);
      } else if (activeId === id) {
        activeId = conversations[0].id;
      }
      saveState();
      renderApp();
    }

    function updateTitleFromMessage(conversation, text) {
      if (!conversation || conversation.title !== "Cuộc hội thoại mới") return;
      conversation.title = text.replace(/\s+/g, " ").trim().slice(0, 54) || conversation.title;
    }

    function formatTime(iso) {
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString("vi-VN", {
        hour: "2-digit",
        minute: "2-digit",
        day: "2-digit",
        month: "2-digit"
      });
    }

    function stepText(item, index) {
      if (item.type === "model") return `${index + 1}. Model (${item.ms}ms): ${item.note || ""}`;
      const args = (item.args || []).join(" ");
      return `${index + 1}. Tool ${item.cmd} ${args} (${item.ms}ms): ${item.summary || ""}`;
    }

    function renderHistory() {
      historyEl.innerHTML = "";
      if (!conversations.length) {
        const empty = document.createElement("div");
        empty.className = "empty-history";
        empty.textContent = "Chưa có lịch sử hội thoại.";
        historyEl.appendChild(empty);
        return;
      }

      conversations.forEach(conversation => {
        const item = document.createElement("button");
        item.className = `thread${conversation.id === activeId ? " active" : ""}`;
        item.type = "button";
        item.addEventListener("click", () => {
          activeId = conversation.id;
          saveState();
          renderApp();
        });

        const textWrap = document.createElement("div");
        const title = document.createElement("div");
        title.className = "thread-title";
        title.textContent = conversation.title || "Cuộc hội thoại mới";
        const meta = document.createElement("div");
        meta.className = "thread-meta";
        const count = conversation.messages.length;
        meta.textContent = `${count} tin nhắn · ${formatTime(conversation.updatedAt)}`;
        textWrap.append(title, meta);

        const remove = document.createElement("button");
        remove.className = "delete-thread";
        remove.type = "button";
        remove.title = "Xóa hội thoại";
        remove.textContent = "×";
        remove.addEventListener("click", event => {
          event.stopPropagation();
          deleteConversation(conversation.id);
        });

        item.append(textWrap, remove);
        historyEl.appendChild(item);
      });
    }

    function createMessageNode(message) {
      const row = document.createElement("div");
      row.className = `msg-row ${message.role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = message.text;

      if (message.meta) {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = message.meta;
        bubble.appendChild(meta);
      }

      if (message.trace && message.trace.length) {
        const traceBox = document.createElement("div");
        traceBox.className = "trace";
        message.trace.forEach((item, index) => {
          const step = document.createElement("div");
          step.className = "step";
          step.textContent = stepText(item, index);
          traceBox.appendChild(step);
        });
        bubble.appendChild(traceBox);

        const menu = document.createElement("button");
        menu.className = "menu-btn";
        menu.type = "button";
        menu.title = "Hiện/ẩn quá trình thực hiện";
        menu.textContent = "⋯";
        menu.addEventListener("click", () => traceBox.classList.toggle("open"));
        row.appendChild(menu);
      }

      row.appendChild(bubble);
      return row;
    }

    function renderMessages() {
      const conversation = currentConversation();
      log.innerHTML = "";
      if (!conversation || !conversation.messages.length) {
        const welcome = document.createElement("div");
        welcome.className = "welcome";
        welcome.innerHTML = "<strong>Bắt đầu một nhiệm vụ trình duyệt</strong>Nhập yêu cầu ở bên dưới. Mỗi cuộc hội thoại được lưu riêng trong lịch sử.";
        log.appendChild(welcome);
        return;
      }
      conversation.messages.forEach(message => log.appendChild(createMessageNode(message)));
      log.scrollTop = log.scrollHeight;
    }

    function renderApp() {
      const conversation = currentConversation();
      conversationTitle.textContent = conversation?.title || "Cuộc hội thoại mới";
      renderHistory();
      renderMessages();
    }

    function appendMessage(role, text, meta = "", trace = []) {
      const conversation = currentConversation();
      if (!conversation) return;
      conversation.messages.push({ role, text, meta, trace, createdAt: nowIso() });
      conversation.updatedAt = nowIso();
      if (role === "user") updateTitleFromMessage(conversation, text);
      saveState();
      renderApp();
    }

    async function loadModels() {
      try {
        const res = await fetch("/health");
        const data = await res.json();
        const selected = localStorage.fastAgentModel || data.defaultModel;
        modelSelect.innerHTML = "";
        (data.models || []).forEach(model => {
          const option = document.createElement("option");
          option.value = model.id;
          option.textContent = `${model.label} - ${model.note}`;
          option.selected = model.id === selected;
          modelSelect.appendChild(option);
        });
      } catch {
        const option = document.createElement("option");
        option.value = "gemini-3.5-flash";
        option.textContent = "gemini-3.5-flash";
        modelSelect.appendChild(option);
      }
    }

    newChat.addEventListener("click", () => {
      const id = createConversation();
      resetServerSession(id);
      status.textContent = "Đã tạo cuộc hội thoại mới.";
      input.focus();
    });

    modelSelect.addEventListener("change", () => {
      localStorage.fastAgentModel = modelSelect.value;
      status.textContent = `Đã chọn model: ${modelSelect.value}`;
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      const conversation = currentConversation();
      const sessionId = activeId;
      const forceReset = !!conversation && conversation.messages.length === 0;
      input.value = "";
      appendMessage("user", message);
      send.disabled = true;
      status.textContent = "Đang xử lý...";
      const started = performance.now();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ sessionId, message, model: modelSelect.value, forceReset })
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "Lỗi không rõ.");
        const calls = (data.trace || []).filter(x => x.type === "model").length;
        const tools = (data.trace || []).filter(x => x.type === "tool").length;
        const meta = `${Math.round(performance.now() - started)}ms · ${data.model} · ${calls} model calls · ${tools} tool calls`;
        appendMessage("assistant", data.final, meta, data.trace || []);
        status.textContent = "Sẵn sàng.";
      } catch (err) {
        appendMessage("assistant", `Lỗi: ${err.message || err}`);
        status.textContent = "Có lỗi.";
      } finally {
        send.disabled = false;
        input.focus();
      }
    });

    input.addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    loadModels();
    renderApp();
  </script>
</body>
</html>
